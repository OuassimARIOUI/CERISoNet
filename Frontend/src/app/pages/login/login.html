<div class="login-container">
  <div class="login-box">
    <h2>Connexion</h2>
    <p class="app-name">CERISoNet</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email">
        <small *ngIf="email?.invalid && email?.touched">Email invalide</small>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" formControlName="password">
        <small *ngIf="password?.invalid && password?.touched">Mot de passe requis</small>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>

      <app-notification></app-notification>

    </form>
  </div>
</div>
